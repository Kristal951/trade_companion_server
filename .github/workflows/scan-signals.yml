name: Scan Signals

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

concurrency:
  group: signal-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Call TradesCompanion signal scan job
        env:
          SCAN_URL: ${{ secrets.SCAN_SIGNALS_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST "$SCAN_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"